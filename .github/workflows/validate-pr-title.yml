name: Validate PR Title

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize

permissions:
  pull-requests: read

jobs:
  validate-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Release Please PR title exemption
        if: ${{ startsWith(github.event.pull_request.head.ref, 'release-please--') }}
        run: echo "Release Please PRs are exempt from the releasable title regex."

      - name: Validate releasable conventional commit title
        if: ${{ !startsWith(github.event.pull_request.head.ref, 'release-please--') }}
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|deps|revert)(\([^)]+\))?(!)?: .+$'
          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "PR title must use a releasable Conventional Commit title such as 'feat: ...' or 'fix: ...'."
            exit 1
          fi
