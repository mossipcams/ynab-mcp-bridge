name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    if: github.event_name != 'pull_request' || !startsWith(github.event.pull_request.head.ref, 'release-please--')
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

      - name: Run coverage thresholds
        if: matrix.node-version == '22.x'
        run: npm run test:coverage

      - name: Run dependency rules
        run: npm run lint:deps

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript typecheck
        run: npm run typecheck

      - name: Run Knip
        run: npm run lint:unused

      - name: Build package
        run: npm run build

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: artifacts/test-results
          if-no-files-found: error

      - name: Upload coverage report
        if: always() && matrix.node-version == '22.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: artifacts/coverage
          if-no-files-found: error
