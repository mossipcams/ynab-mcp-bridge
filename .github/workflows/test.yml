name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-22:
    name: validate (22.x)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests for Release Please PRs
        if: github.event_name == 'pull_request' && startsWith(github.event.pull_request.head.ref, 'release-please--')
        run: npm run test:ci

      - name: Run full tests
        if: github.event_name != 'pull_request' || !startsWith(github.event.pull_request.head.ref, 'release-please--')
        run: npm run test:ci

      - name: Run coverage thresholds
        if: github.event_name != 'pull_request' || !startsWith(github.event.pull_request.head.ref, 'release-please--')
        run: npm run test:coverage

      - name: Run dependency rules
        if: github.event_name != 'pull_request' || !startsWith(github.event.pull_request.head.ref, 'release-please--')
        run: npm run lint:deps

      - name: Run ESLint
        if: github.event_name != 'pull_request' || !startsWith(github.event.pull_request.head.ref, 'release-please--')
        run: npm run lint

      - name: Run TypeScript typecheck
        run: npm run typecheck

      - name: Run Knip
        if: github.event_name != 'pull_request' || !startsWith(github.event.pull_request.head.ref, 'release-please--')
        run: npm run lint:unused

      - name: Build package
        run: npm run build

      - name: Upload release-please test reports
        if: always() && github.event_name == 'pull_request' && startsWith(github.event.pull_request.head.ref, 'release-please--')
        uses: actions/upload-artifact@v4
        with:
          name: release-please-test-results
          path: artifacts/test-results
          if-no-files-found: warn

      - name: Upload test reports
        if: always() && (github.event_name != 'pull_request' || !startsWith(github.event.pull_request.head.ref, 'release-please--'))
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-22.x
          path: artifacts/test-results
          if-no-files-found: error

      - name: Upload coverage report
        if: always() && (github.event_name != 'pull_request' || !startsWith(github.event.pull_request.head.ref, 'release-please--'))
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node-22.x
          path: artifacts/coverage
          if-no-files-found: error

  validate-24:
    name: validate (24.x)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Release Please 24.x validation marker
        if: github.event_name == 'pull_request' && startsWith(github.event.pull_request.head.ref, 'release-please--')
        run: echo "Release Please PRs keep a lightweight reported 24.x validation context."

      - name: Run tests
        if: github.event_name != 'pull_request' || !startsWith(github.event.pull_request.head.ref, 'release-please--')
        run: npm run test:ci

      - name: Run dependency rules
        if: github.event_name != 'pull_request' || !startsWith(github.event.pull_request.head.ref, 'release-please--')
        run: npm run lint:deps

      - name: Run ESLint
        if: github.event_name != 'pull_request' || !startsWith(github.event.pull_request.head.ref, 'release-please--')
        run: npm run lint

      - name: Run TypeScript typecheck
        if: github.event_name != 'pull_request' || !startsWith(github.event.pull_request.head.ref, 'release-please--')
        run: npm run typecheck

      - name: Build package
        if: github.event_name != 'pull_request' || !startsWith(github.event.pull_request.head.ref, 'release-please--')
        run: npm run build

      - name: Upload test reports
        if: always() && (github.event_name != 'pull_request' || !startsWith(github.event.pull_request.head.ref, 'release-please--'))
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-24.x
          path: artifacts/test-results
          if-no-files-found: error
