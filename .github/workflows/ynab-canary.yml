name: YNAB Canary

on:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  validate-latest-ynab:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: "npm"

      - name: Install locked dependencies
        run: npm ci

      - name: Install latest YNAB SDK
        run: npm install --no-save ynab@latest

      - name: Capture installed YNAB version
        id: ynab-version
        run: echo "version=$(node -p \"require('./node_modules/ynab/package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Run canary verification
        id: verify
        continue-on-error: true
        run: |
          npm test
          npm run build

      - name: Create or update canary failure issue
        if: steps.verify.outcome == 'failure'
        uses: actions/github-script@v7
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          YNAB_VERSION: ${{ steps.ynab-version.outputs.version }}
        with:
          script: |
            const marker = "<!-- ynab-canary -->";
            const title = "deps: ynab canary failed";
            const body = `${marker}

            The scheduled YNAB canary failed while validating \`ynab@latest\`.

            - YNAB version: ${process.env.YNAB_VERSION}
            - Run URL: ${process.env.RUN_URL}
            - Workflow: ${context.workflow}
            - Commit: ${context.sha}
            - Failing step: Run canary verification

            Review the linked workflow logs for the first failing test or build error and update the bridge if the upstream SDK contract changed.`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });

            const existingIssue = issues.find(
              (issue) => issue.title === title && issue.body?.includes(marker),
            );

            if (existingIssue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body,
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
            });

      - name: Fail if the canary verification failed
        if: steps.verify.outcome == 'failure'
        run: exit 1
