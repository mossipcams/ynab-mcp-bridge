name: Release Please

on:
  push:
    branches:
      - main

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v4
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Trigger Release Please PR checks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t release_branches < <(
            gh pr list \
              --state open \
              --base main \
              --json headRefName \
              --jq '.[] | select(.headRefName | startswith("release-please--")) | .headRefName'
          )

          if [ "${#release_branches[@]}" -eq 0 ]; then
            echo "No open Release Please PR branches found."
            exit 0
          fi

          for branch in "${release_branches[@]}"; do
            echo "Dispatching release-please-pr-checks.yml for ${branch}"
            gh workflow run release-please-pr-checks.yml --ref "${branch}"
          done
